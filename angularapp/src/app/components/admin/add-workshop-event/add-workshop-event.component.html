<div class="page-header">
  <div class="header-inline">
    <button (click)="goBack()" class="btn-ghost"><i class="fas fa-arrow-left"></i></button>
    <div>
      <h1>Add Workshop Event</h1>
      <p class="muted">Create a new workshop with all required details.</p>
    </div>
  </div>
</div>

<div class="page-body page-body-narrow">
  <div *ngIf="errorMessage" class="panel alert error"><i class="fas fa-circle-exclamation"></i>{{errorMessage}}</div>
  <div *ngIf="successMessage" class="panel alert success"><i class="fas fa-circle-check"></i>{{successMessage}}</div>

  <form (ngSubmit)="onSubmit()" #addForm="ngForm" class="panel form-shell">
    <div class="form-grid-two">
      <div class="field field-wide">
        <label>Event Name</label>
        <input type="text" name="eventName" [(ngModel)]="workshopEvent.EventName" required class="input" placeholder="Advanced JavaScript Workshop">
      </div>

      <div class="field">
        <label>Organiser Name</label>
        <input type="text" name="organizerName" [(ngModel)]="workshopEvent.OrganizerName" required class="input" placeholder="Company / organizer">
      </div>

      <div class="field">
        <label>Category</label>
        <input type="text" name="category" [(ngModel)]="workshopEvent.Category" required class="input" placeholder="Technology">
      </div>

      <div class="field">
        <label>Location</label>
        <input type="text" name="location" [(ngModel)]="workshopEvent.Location" required class="input" placeholder="City, venue, or online">
      </div>

      <div class="field">
        <label>Capacity</label>
        <input type="number" name="capacity" [(ngModel)]="workshopEvent.Capacity" required min="1" class="input" placeholder="100">
      </div>

      <div class="field">
        <label>Start Date & Time</label>
        <input type="datetime-local" name="startDateTime" [(ngModel)]="workshopEvent.StartDateTime" required class="input">
      </div>

      <div class="field">
        <label>End Date & Time</label>
        <input type="datetime-local" name="endDateTime" [(ngModel)]="workshopEvent.EndDateTime" required class="input">
      </div>
    </div>

    <div class="field">
      <label>Description</label>
      <textarea name="description" [(ngModel)]="workshopEvent.Description" required rows="4" class="input" placeholder="Topics, goals, target audience..."></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-ghost" (click)="goBack()"><i class="fas fa-arrow-left"></i>Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="loading">
        <i *ngIf="loading" class="fas fa-spinner fa-spin"></i>
        <i *ngIf="!loading" class="fas fa-plus"></i>
        {{ loading ? 'Creating...' : 'Create Workshop' }}
      </button>
    </div>
  </form>
</div>
