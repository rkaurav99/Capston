<div class="bg-white border-b border-gray-100 px-8 py-6">
  <h1 class="text-2xl font-black text-gray-900" style="font-family:'Space Grotesk',sans-serif">Manage Bookings</h1>
  <p class="text-gray-400 text-sm mt-0.5">Review and update booking statuses</p>
</div>

<div class="p-8">
  <div *ngIf="errorMessage" class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-600 rounded-xl px-5 py-4 mb-5 text-sm">
    <i class="fas fa-triangle-exclamation"></i>{{errorMessage}}
  </div>
  <div *ngIf="successMessage" class="flex items-center gap-3 bg-green-50 border border-green-200 text-green-600 rounded-xl px-5 py-4 mb-5 text-sm">
    <i class="fas fa-circle-check"></i>{{successMessage}}
  </div>

  <div *ngIf="bookings.length === 0" class="bg-white rounded-2xl border border-gray-100 p-14 text-center">
    <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
      <i class="fas fa-ticket text-indigo-200 text-2xl"></i>
    </div>
    <p class="text-gray-500 text-sm">No bookings yet</p>
  </div>

  <div *ngIf="bookings.length > 0" class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="text-left px-5 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
            <th class="text-left px-5 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">User</th>
            <th class="text-left px-5 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Event</th>
            <th class="text-left px-5 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">City</th>
            <th class="text-left px-5 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Date</th>
            <th class="text-left px-5 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
            <th class="text-left px-5 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr *ngFor="let b of bookings" class="hover:bg-gray-50 transition">
            <td class="px-5 py-3.5"><span class="font-mono font-semibold text-gray-600">#{{b.BookingId}}</span></td>
            <td class="px-5 py-3.5">
              <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full bg-indigo-100 flex items-center justify-center text-xs font-bold text-indigo-600 flex-shrink-0">U</div>
                <span class="text-gray-700 text-sm">User #{{b.UserId}}</span>
              </div>
            </td>
            <td class="px-5 py-3.5 text-gray-600">Event #{{b.WorkshopEventId}}</td>
            <td class="px-5 py-3.5 text-gray-500">{{b.City}}</td>
            <td class="px-5 py-3.5 text-gray-400 text-xs">{{b.BookingDate | date:'MMM d, y'}}</td>
            <td class="px-5 py-3.5">
              <span class="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full"
                [ngClass]="{
                  'bg-green-100 text-green-700': b.BookingStatus==='Approved',
                  'bg-indigo-100 text-indigo-700': b.BookingStatus==='Submitted',
                  'bg-yellow-100 text-yellow-700': b.BookingStatus==='Pending',
                  'bg-red-100 text-red-700': b.BookingStatus==='Cancelled'
                }">
                <i class="fas fa-circle text-[5px]"></i>{{b.BookingStatus}}
              </span>
            </td>
            <td class="px-5 py-3.5">
              <div class="flex items-center gap-1.5 flex-wrap">
                <button *ngIf="b.BookingStatus !== 'Approved'" (click)="updateStatus(b,'Approved')"
                  class="px-2.5 py-1 rounded-lg bg-green-50 text-green-600 hover:bg-green-100 text-xs font-semibold transition">
                  <i class="fas fa-check text-xs mr-1"></i>Approve
                </button>
                <button *ngIf="b.BookingStatus !== 'Cancelled'" (click)="updateStatus(b,'Cancelled')"
                  class="px-2.5 py-1 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 text-xs font-semibold transition">
                  <i class="fas fa-ban text-xs mr-1"></i>Cancel
                </button>
                <button (click)="deleteBooking(b.BookingId)"
                  class="px-2.5 py-1 rounded-lg bg-gray-50 text-gray-500 hover:bg-gray-100 text-xs font-semibold transition">
                  <i class="fas fa-trash text-xs"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
