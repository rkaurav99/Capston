<div class="bg-white border-b border-gray-100 px-8 py-6">
  <div class="flex items-center gap-3">
    <button (click)="goBack()" class="w-9 h-9 rounded-xl bg-gray-100 hover:bg-indigo-100 flex items-center justify-center transition">
      <i class="fas fa-arrow-left text-gray-600 text-sm"></i>
    </button>
    <div>
      <h1 class="text-2xl font-black text-gray-900" style="font-family:'Poppins',sans-serif">Edit Workshop Event</h1>
      <p class="text-gray-400 text-sm mt-0.5">Update the details for this workshop</p>
    </div>
  </div>
</div>

<div class="p-8 max-w-2xl">
  <div *ngIf="errorMessage" class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-600 rounded-xl px-5 py-4 mb-6 text-sm">
    <i class="fas fa-circle-exclamation mt-0.5 flex-shrink-0"></i><span>{{errorMessage}}</span>
  </div>
  <div *ngIf="successMessage" class="flex items-start gap-3 bg-green-50 border border-green-200 text-green-600 rounded-xl px-5 py-4 mb-6 text-sm">
    <i class="fas fa-circle-check mt-0.5 flex-shrink-0"></i><span>{{successMessage}}</span>
  </div>

  <form (ngSubmit)="onSubmit()" #editForm="ngForm">
    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-6 space-y-5">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="sm:col-span-2">
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Event Name</label>
          <div class="relative">
            <i class="fas fa-calendar-star absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" name="eventName" [(ngModel)]="workshopEvent.EventName" required
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition"
              placeholder="e.g. Advanced JavaScript Workshop">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Organiser Name</label>
          <div class="relative">
            <i class="fas fa-user-tie absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" name="organizerName" [(ngModel)]="workshopEvent.OrganizerName" required
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition"
              placeholder="Organiser / company name">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Category</label>
          <div class="relative">
            <i class="fas fa-tag absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" name="category" [(ngModel)]="workshopEvent.Category" required
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition"
              placeholder="e.g. Technology, Business">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Location</label>
          <div class="relative">
            <i class="fas fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" name="location" [(ngModel)]="workshopEvent.Location" required
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition"
              placeholder="City, Venue or Online">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Capacity</label>
          <div class="relative">
            <i class="fas fa-users absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="number" name="capacity" [(ngModel)]="workshopEvent.Capacity" required min="1"
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition"
              placeholder="Max attendees">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Start Date &amp; Time</label>
          <div class="relative">
            <i class="fas fa-calendar-plus absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="datetime-local" name="startDateTime" [(ngModel)]="workshopEvent.StartDateTime" required
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">End Date &amp; Time</label>
          <div class="relative">
            <i class="fas fa-calendar-check absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="datetime-local" name="endDateTime" [(ngModel)]="workshopEvent.EndDateTime" required
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition">
          </div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Description</label>
        <textarea name="description" [(ngModel)]="workshopEvent.Description" required rows="4"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 resize-none transition"
          placeholder="Describe the workshop — topics, goals, target audience..."></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="button" (click)="goBack()"
          class="flex-1 py-3 rounded-xl text-gray-600 bg-gray-100 hover:bg-gray-200 text-sm font-semibold transition flex items-center justify-center gap-2">
          <i class="fas fa-arrow-left"></i> Cancel
        </button>
        <button type="submit" [disabled]="loading"
          class="flex-1 py-3 rounded-xl text-white text-sm font-semibold shadow transition hover:opacity-90 disabled:opacity-60 flex items-center justify-center gap-2"
          style="background:linear-gradient(135deg,#6366f1,#a855f7)">
          <i *ngIf="loading" class="fas fa-spinner fa-spin"></i>
          <i *ngIf="!loading" class="fas fa-plus"></i>
          {{ loading ? 'Updating...' : 'Update Workshop' }}
        </button>
      </div>
    </div>
  </form>
</div>
