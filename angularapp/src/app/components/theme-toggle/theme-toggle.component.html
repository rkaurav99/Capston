<div class="theme-toggle-shell" role="group" aria-label="Theme switcher">
  <button
    type="button"
    *ngFor="let theme of themes; trackBy: trackTheme"
    class="theme-chip"
    [class.is-active]="theme.key === activeTheme"
    (click)="selectTheme(theme.key)"
    [attr.aria-pressed]="theme.key === activeTheme"
  >
    <i class="fas" [ngClass]="theme.key === 'dark' ? 'fa-moon' : 'fa-sun'"></i>
    <span>{{ theme.name }}</span>
  </button>
</div>
