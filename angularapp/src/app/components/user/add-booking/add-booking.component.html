<div class="bg-white border-b border-gray-100 px-8 py-6">
  <div class="flex items-center gap-3">
    <button (click)="goBack()" class="w-9 h-9 rounded-xl bg-gray-100 hover:bg-indigo-100 flex items-center justify-center transition">
      <i class="fas fa-arrow-left text-gray-600 text-sm"></i>
    </button>
    <div>
      <h1 class="text-2xl font-black text-gray-900" style="font-family:'Poppins',sans-serif">Book Workshop</h1>
      <p class="text-gray-400 text-sm mt-0.5">Fill in your details to reserve your spot</p>
    </div>
  </div>
</div>

<div class="p-8 max-w-2xl">
  <div *ngIf="errorMessage" class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-600 rounded-xl px-5 py-4 mb-6 text-sm">
    <i class="fas fa-circle-exclamation mt-0.5 flex-shrink-0"></i><span>{{errorMessage}}</span>
  </div>
  <div *ngIf="successMessage" class="flex items-start gap-3 bg-green-50 border border-green-200 text-green-600 rounded-xl px-5 py-4 mb-6 text-sm">
    <i class="fas fa-circle-check mt-0.5 flex-shrink-0"></i><span>{{successMessage}}</span>
  </div>

  <form (ngSubmit)="onSubmit()" #bookingForm="ngForm">
    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-6 space-y-5">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Gender</label>
          <div class="relative">
            <i class="fas fa-venus-mars absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <select name="gender" [(ngModel)]="booking.Gender" required
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 appearance-none transition">
              <option value="">Select gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Age</label>
          <div class="relative">
            <i class="fas fa-calendar-days absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="number" name="age" [(ngModel)]="booking.Age" required min="1" max="120"
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition"
              placeholder="Your age">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">Occupation</label>
          <div class="relative">
            <i class="fas fa-briefcase absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" name="occupation" [(ngModel)]="booking.Occupation" required
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition"
              placeholder="e.g. Software Engineer">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">City</label>
          <div class="relative">
            <i class="fas fa-city absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" name="city" [(ngModel)]="booking.City" required
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition"
              placeholder="Your city">
          </div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Proof / ID Reference</label>
        <div class="relative">
          <i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
          <input type="text" name="proof" [(ngModel)]="booking.Proof" required
            class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 transition"
            placeholder="Aadhar / Passport / Employee ID">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Additional Notes <span class="text-gray-300 font-normal">(optional)</span></label>
        <textarea name="additionalNotes" [(ngModel)]="booking.AdditionalNotes" rows="3"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-gray-50 resize-none transition"
          placeholder="Any special requirements or notes..."></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="button" (click)="goBack()"
          class="flex-1 py-3 rounded-xl text-gray-600 bg-gray-100 hover:bg-gray-200 text-sm font-semibold transition flex items-center justify-center gap-2">
          <i class="fas fa-arrow-left"></i> Cancel
        </button>
        <button type="submit" [disabled]="loading"
          class="flex-1 py-3 rounded-xl text-white text-sm font-semibold shadow transition hover:opacity-90 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2"
          style="background:linear-gradient(135deg,#6366f1,#a855f7)">
          <i *ngIf="loading" class="fas fa-spinner fa-spin"></i>
          <i *ngIf="!loading" class="fas fa-ticket"></i>
          {{ loading ? 'Booking...' : 'Confirm Booking' }}
        </button>
      </div>
    </div>
  </form>
</div>
